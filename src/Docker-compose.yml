services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/userdb
      DB_USER: postgres
      DB_PASSWORD: qwerty
    depends_on:
      - db

volumes:
  postgres_data: